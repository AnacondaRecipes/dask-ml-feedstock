{% set name = "dask-ml" %}
{% set version = "2025.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace("-","_") }}-{{ version }}.tar.gz
  sha256: b31caeb5f603f9537ffa34bd247e0e1fcefda7c007631260f8abdee49f89b1e1

build:
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python
    - dask-glm >=0.2.0
    # 1) dask-ml requires dask with dask.array and dask.dataframe
    # 2) upperbound 2025.10.0 added, import dask_ml stop working becasue:
    # dask package version string is invalid for packaging.version.parse() - likely contains development version markers like + or non-standard suffixes that packaging.version.Version doesn't accept.
    # Failed with:
    # DASK_VERSION = packaging.version.parse(dask.__version__)
    # raise InvalidVersion(f"Invalid version: {version!r}")
    - dask >=2025.1.0,<=2025.10.0
    - distributed >=2025.1.0,<=2025.10.0
    - multipledispatch >=0.4.9
    - numba >=0.51.0
    - numpy >=1.24.0
    - packaging
    - pandas >=2.0
    - scikit-learn >=1.6.1
    - scipy

test:
  imports:
    - dask_ml
    - dask_ml.cluster
    - dask_ml.decomposition
    - dask_ml.feature_extraction
    - dask_ml.linear_model
    - dask_ml.metrics
    - dask_ml.model_selection
    - dask_ml.preprocessing
    - dask_ml.utils
    - dask_ml.wrappers
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/dask/dask-ml
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Distributed and parallel machine learning using dask.
  description: |
    Dask-ML provides scalable machine learning in Python
    using Dask alongside popular machine learning libraries like Scikit-Learn, XGBoost, and others.
  doc_url: https://ml.dask.org
  dev_url: https://github.com/dask/dask-ml

extra:
  recipe-maintainers:
    - TomAugspurger
    - jrbourbeau
